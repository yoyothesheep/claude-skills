  <text x="640" y="425" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="700" letter-spacing="1.5">DISTRIBUTE-SOCIAL</text>
  <text x="640" y="447" text-anchor="middle" fill="#334155" font-size="10">Reddit + LinkedIn drafts · Social graphics</text>

