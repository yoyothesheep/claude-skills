  <rect x="470" y="476" width="340" height="46" rx="3" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <rect x="470" y="476" width="340" height="22" rx="3" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
  <text x="640" y="491" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="700" letter-spacing="1.5">DISTRIBUTE-OUTREACH</text>
